<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Custom Profile</title>
    <link rel="stylesheet" href="CustomProfile.css">
</head>
<body>

<header class="navbar">
    <div class="logo">Career Center Volunteer</div>
    <nav>
        <a href="#">About Us</a>
        <a href="#">Help/FAQ</a>
        <a href="#">Calendar</a>
    </nav>
    <div class="icons">
        <span>🔍</span>
        <span>🔔</span>
        <span>👤</span>
    </div>
</header>

<div class="container">
    <div class="profile-card">

        <div class="profile-header">
            <div class="avatar"></div>
            <!-- Editable Name -->
            <input type="text" id="displayName" class="name-input" value="John Harry">
        </div>

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="fullName" value="John Harry">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" value="johnharry@gmail.com">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" value="***************">
        </div>

        <div class="form-group">
            <label>Phone</label>
            <input type="text" id="phone" value="(916) 1234 5678">
        </div>

        <div class="buttons">
            <button class="save-btn" onclick="saveChanges()">Save changes</button>
            <button class="logout-btn" onclick="logout()">Log out</button>
        </div>

    </div>
</div>

<!-- Notification -->
<div id="notification" class="notification"></div>

<script src="CustomProfile.js"></script>
</body>
</html>
